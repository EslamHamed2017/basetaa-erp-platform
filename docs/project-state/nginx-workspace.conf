# Basetaa ERP Platform
# erp.basetaa.com, control.erp.basetaa.com -> Next.js
# *.erp.basetaa.com (tenant subdomains) -> auth_request gate -> Odoo or Next.js

upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream odoo {
    server 127.0.0.1:8069;
    keepalive 32;
}

# -- HTTPS: platform domains -> Next.js ---------------------------------------
server {
    listen 443 ssl;
    server_name erp.basetaa.com control.erp.basetaa.com;

    ssl_certificate     /etc/letsencrypt/live/erp.basetaa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.basetaa.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/basetaa-erp.access.log;
    error_log  /var/log/nginx/basetaa-erp.error.log;

    client_max_body_size 50m;

    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}

# -- HTTPS: tenant subdomains -> auth_request gate ----------------------------
server {
    listen 443 ssl;
    server_name ~^(?P<sub>[a-z0-9]+)\.erp\.basetaa\.com$;

    ssl_certificate     /etc/letsencrypt/live/erp.basetaa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.basetaa.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/basetaa-tenant.access.log;
    error_log  /var/log/nginx/basetaa-tenant.error.log;

    client_max_body_size 100m;

    # Internal subrequest to Next.js tenant-gate API
    location = /_tenant_gate {
        internal;
        proxy_pass http://nextjs/api/tenant-gate?sub=$sub;
        proxy_set_header X-Nginx-Internal 1;
        proxy_set_header Host erp.basetaa.com;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_read_timeout 5s;
    }

    # Tenant not ready -> Next.js workspace page shows correct UI
    location @nextjs_workspace {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Block Odoo database manager from external access.
    # Next.js provisioning calls Odoo directly on localhost:8069, bypassing Nginx.
    location ~ ^/web/database/ {
        deny all;
    }

    location / {
        auth_request /_tenant_gate;

        # 403 from gate (not found / inactive / not ready) -> Next.js workspace page
        error_page 403 = @nextjs_workspace;

        # Gate passed (200): proxy to Odoo
        proxy_pass http://odoo;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}

# -- HTTP -> HTTPS redirect ---------------------------------------------------
server {
    listen 80;
    server_name erp.basetaa.com *.erp.basetaa.com;
    return 301 https://$host$request_uri;
}
